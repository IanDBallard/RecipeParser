name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.4)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller recipeparser.spec -y

      - name: Build installer
        run: |
          New-Item -ItemType Directory -Force output
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & $iscc installer.iss

      - name: Prepare release asset
        run: |
          $exe = Get-ChildItem output/*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in output"; exit 1 }
          Copy-Item $exe.FullName -Destination "RecipeParser-Setup.exe"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: RecipeParser-Setup.exe
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
