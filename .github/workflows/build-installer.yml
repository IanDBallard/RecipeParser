name: Build Windows Installer

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline overview
#
#   test        — unit tests on every push/PR (fast feedback, no Windows needed)
#   build       — PyInstaller + Inno Setup on windows-latest (tags only)
#   smoke-test  — launch the built .exe, verify --help / --version / error paths
#   release     — create GitHub Release and attach the versioned installer
#
# Triggers
#   • Any push or PR  →  test job only
#   • Push a tag v*   →  full pipeline (test → build → smoke-test → release)
#   • workflow_dispatch with a tag  →  full pipeline (manual re-run)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
    tags:     ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.1.0) — must already exist in the repo'
        required: true

permissions:
  contents: write   # needed to create/update releases and upload assets

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Unit tests — runs on every push and PR for fast feedback
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . pytest pytest-cov

      - name: Run unit tests
        env:
          # Required so the /ingest/url tests can call the FastAPI TestClient
          # without a real JWT.  NEVER set this in production deployments.
          DISABLE_AUTH: '1'
          # Dummy value — tests never hit real Supabase; prevents KeyError in auth middleware
          SUPABASE_JWT_SECRET: 'ci-dummy-secret-not-used-in-production'
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/smoke_test_exe.py \
            --ignore=tests/smoke_test_docker.py \
            --tb=short \
            --cov=recipeparser \
            --cov-report=term-missing

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Build installer — only on tag pushes, requires tests to pass
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build installer
    needs: test
    # Only run on tag pushes or manual dispatch — not on every branch push/PR
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    outputs:
      version:        ${{ steps.version.outputs.version }}
      installer_name: ${{ steps.version.outputs.installer_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # ── Resolve version from pyproject.toml (single source of truth) ───────
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $raw = (Select-String -Path pyproject.toml -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          if (-not $raw) { Write-Error "Could not parse version from pyproject.toml"; exit 1 }
          $name = "RecipeParser-Setup-$raw.exe"
          echo "version=$raw"         >> $env:GITHUB_OUTPUT
          echo "installer_name=$name" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $raw  |  Installer: $name"

      # ── Validate installer.iss version matches pyproject.toml ───────────────
      - name: Validate installer.iss version
        shell: pwsh
        run: |
          $pyVer  = "${{ steps.version.outputs.version }}"
          $issVer = (Select-String -Path installer.iss -Pattern '^#define AppVersion\s+"(.+)"').Matches[0].Groups[1].Value
          if ($issVer -ne $pyVer) {
            Write-Error "Version mismatch: pyproject.toml=$pyVer  installer.iss=$issVer`nUpdate installer.iss AppVersion before tagging."
            exit 1
          }
          Write-Host "Version check passed: $pyVer"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      # Use requirements.txt for pinned reproducible deps
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . pyinstaller

      # Verify GUI libs are present before spending time on PyInstaller
      - name: Verify tkinter + customtkinter
        run: python -c "import tkinter; import customtkinter; import darkdetect; print('GUI deps OK')"

      - name: Build with PyInstaller
        run: pyinstaller recipeparser.spec --noconfirm

      # ── Validate customtkinter assets are in the bundle ─────────────────────
      # customtkinter ships theme JSON files and fonts that MUST be present for
      # the GUI to start.  If collect_all("customtkinter") failed silently these
      # files would be absent and the app would crash on launch.
      - name: Validate customtkinter assets in bundle
        shell: pwsh
        run: |
          $bundleDir = "dist\RecipeParser"

          # Diagnostic: show top-level bundle contents to aid debugging
          Write-Host "=== Bundle top-level contents ==="
          Get-ChildItem $bundleDir | ForEach-Object { Write-Host "  $($_.Name)" }

          # customtkinter data may land in customtkinter/ subdir OR be merged
          # into the root — search the whole bundle for theme JSON files
          $themes = Get-ChildItem -Recurse -Filter "*.json" $bundleDir -ErrorAction SilentlyContinue |
                    Where-Object { $_.FullName -match "customtkinter" }
          if (-not $themes) {
            # Fallback: any .json at all (customtkinter themes are the only JSONs we bundle)
            $themes = Get-ChildItem -Recurse -Filter "*.json" $bundleDir -ErrorAction SilentlyContinue
          }
          if (-not $themes) {
            Write-Error "No customtkinter theme JSON files found in bundle — customtkinter data not bundled"
            exit 1
          }
          Write-Host "customtkinter themes: $($themes.Count) JSON file(s)"
          $themes | ForEach-Object { Write-Host "  $($_.FullName.Replace((Resolve-Path $bundleDir).Path + '\', ''))" }

          $darkdetect = Get-ChildItem -Recurse -Filter "darkdetect*" $bundleDir -ErrorAction SilentlyContinue
          if (-not $darkdetect) {
            Write-Error "darkdetect not found in bundle — customtkinter theme detection will fail at runtime"
            exit 1
          }
          Write-Host "darkdetect: $($darkdetect[0].Name)"
          Write-Host "customtkinter bundle validation PASSED"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output | Out-Null
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { Write-Error "ISCC.exe not found"; exit 1 }
          Write-Host "Using ISCC: $iscc"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup failed"; exit 1 }

      - name: Verify installer output
        shell: pwsh
        run: |
          $expected = "output\${{ steps.version.outputs.installer_name }}"
          if (-not (Test-Path $expected)) {
            Write-Host "Files in output\:"; Get-ChildItem output\ | ForEach-Object { Write-Host "  $_" }
            Write-Error "Expected installer not found: $expected"; exit 1
          }
          $sizeMB = [math]::Round((Get-Item $expected).Length / 1MB, 1)
          Write-Host "Installer OK: $expected  ($sizeMB MB)"

      # Upload both the bundle dir and the installer as artifacts so the
      # smoke-test job can access the .exe without re-running PyInstaller.
      - name: Upload PyInstaller bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecipeParser-bundle
          path: dist/RecipeParser/
          retention-days: 3

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.installer_name }}
          path: output/${{ steps.version.outputs.installer_name }}
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3a: Docker smoke test — verify Docker image builds (ubuntu has Docker)
  # ═══════════════════════════════════════════════════════════════════════════
  smoke-test-docker:
    name: Smoke test Docker build
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Docker smoke test
        run: python tests/smoke_test_docker.py

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3b: Smoke test — launch the built exe and verify it works
  # ═══════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke test built exe
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout source (for smoke test script)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download PyInstaller bundle
        uses: actions/download-artifact@v4
        with:
          name: RecipeParser-bundle
          path: dist/RecipeParser/

      - name: Set up Python (for smoke test runner only)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inspect downloaded bundle
        shell: pwsh
        run: |
          Write-Host "=== Contents of dist\RecipeParser\ ==="
          if (Test-Path "dist\RecipeParser") {
            Get-ChildItem -Recurse "dist\RecipeParser" | Select-Object -First 50 |
              ForEach-Object { Write-Host "  $($_.FullName)" }
            $totalMB = [math]::Round((Get-ChildItem -Recurse -File "dist\RecipeParser" |
              Measure-Object -Property Length -Sum).Sum / 1MB, 1)
            Write-Host "Total bundle size: $totalMB MB"
          } else {
            Write-Host "dist\RecipeParser does not exist!"
          }

      # Run the smoke test script against the built exe.
      # This validates that the exe:
      #   1. Exists and is non-empty (> 20 MB)
      #   2. --help exits 0 and prints usage
      #   3. --version exits 0 and prints the correct version number
      #   4. A bad epub path exits non-zero with an error message
      - name: Run smoke tests against built exe
        shell: pwsh
        run: |
          $exe     = "dist\RecipeParser\RecipeParser.exe"
          $version = "${{ needs.build.outputs.version }}"
          Write-Host "Testing: $exe  (expected version: $version)"
          python tests/smoke_test_exe.py $exe $version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Smoke tests FAILED — see output above"
            exit 1
          }

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Release — create GitHub Release and attach the installer
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Publish release
    needs: [build, smoke-test, smoke-test-docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.installer_name }}
          path: dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ github.event.inputs.tag || github.ref_name }}
          name:                    v${{ needs.build.outputs.version }}
          generate_release_notes:  true
          fail_on_unmatched_files: true
          files: dist/${{ needs.build.outputs.installer_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
