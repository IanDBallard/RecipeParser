# Paprika category taxonomy
#
# Each entry is either:
#   - A plain string (top-level category)
#   - A mapping with a single key (the parent) whose value is a list of
#     child (leaf) category names
#
# Paprika matches categories by their exact leaf name, so only the leaf
# names are written into the exported JSON.  The parent names provide
# context for the AI categorisation prompt.
#
# To customise: add, remove, or rename entries to match your Paprika library.

